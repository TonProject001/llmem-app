<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Láor Skincare Member</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #fcfcfc; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px;}
        img { border-radius: 50%; width: 120px; height: 120px; border: 3px solid #ffccba; }
        input { padding: 12px; margin: 10px 0; width: 80%; border-radius: 8px; border: 1px solid #ddd; font-size: 16px;}
        button { padding: 12px; width: 85%; background-color: #00B900; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .history-list { list-style-type: none; padding: 0; text-align: left; margin-top: 15px; }
        .history-item { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 14px;}
        .status-pending { color: #ff9800; font-weight: bold; background: #fff3e0; padding: 4px 8px; border-radius: 12px; font-size: 12px;}
        .status-approved { color: #4caf50; font-weight: bold; background: #e8f5e9; padding: 4px 8px; border-radius: 12px; font-size: 12px;}
        .toggle-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; color: #333; margin: 0; }
        .toggle-icon { font-size: 12px; transition: transform 0.3s; }
        
        #loading { margin-top: 50px; color: gray; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #ffccba; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* สไตล์ใหม่สำหรับกล่องแจ้งเตือนแต้มหมดอายุ */
        .expiry-warning { background-color: #fff4f4; color: #d9534f; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 15px; border: 1px solid #f5c6c6; display: none; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loader"></div>
        <h3>กำลังเตรียมข้อมูลสมาชิก...</h3>
        <p id="errorLog" style="color: red; font-size: 12px; margin-top: 15px;"></p>
    </div>

    <div id="appContent" style="display: none;">
        <div class="card" id="profileCard">
            <img id="pictureUrl" src="" alt="Profile Image">
            <h2 id="displayName">กำลังโหลด...</h2>
            <p>สถานะ: <strong id="level" style="color: #ff9d76;">กำลังโหลด...</strong></p>
            <p>แต้มสะสม: <strong id="points">0</strong> แต้ม</p>
            
            <div id="expiryWarningBox" class="expiry-warning">
                ⚠️ แต้มใกล้หมดอายุ: <strong id="expPoints">0</strong> แต้ม <br>(ในวันที่ <span id="expDate">-</span>)
            </div>
        </div>

        <div class="card" id="orderCard">
            <h3>แจ้งหมายเลขคำสั่งซื้อ</h3>
            <p style="font-size: 14px; color: gray;">เพื่อสะสมแต้ม</p>
            <input type="text" id="orderId" placeholder="เช่น ORD-12345">
            <button onclick="submitOrder()">ส่งตรวจสอบรับแต้ม</button>
            <p id="statusMessage" style="font-size: 14px; margin-top: 10px;"></p>
        </div>

        <div class="card" id="historyCard">
            <h3 class="toggle-header" onclick="toggleHistory()">
                <span>ประวัติการแจ้งออร์เดอร์</span>
                <span class="toggle-icon" id="toggleIcon">▼</span>
            </h3>
            <div id="historyContent" style="display: none;">
                <ul class="history-list" id="historyList">
                    <li style="text-align: center; color: gray; font-size: 14px;">กำลังโหลดประวัติ...</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009822263-SUKU0laL";
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzweZX0Er9qzwPd3pVOhNTXZHVJRrJNW6E-v1e4xgk3AacU2lq3PGfwMQyjNB8iJhaWvg/exec"; 

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) { getUserProfile(); } 
                else { liff.login(); }
            } catch (err) {
                document.getElementById("loading").innerHTML = "<h3>ขออภัย ไม่สามารถเชื่อมต่อระบบ LINE ได้</h3><p style='color:red; font-size:12px;'>" + err.message + "</p><p style='font-size:14px;'>กรุณาลองปิดแอป LINE แล้วเข้าใหม่อีกครั้ง</p>";
            }
        }

        async function getUserProfile() {
            try {
                const profile = await liff.getProfile();
                document.getElementById("pictureUrl").src = profile.pictureUrl;
                document.getElementById("displayName").innerText = profile.displayName;
                
                document.getElementById("loading").style.display = "none";
                document.getElementById("appContent").style.display = "block";

                fetchUserData(profile);
                fetchOrderHistory(profile.userId);
            } catch (err) {
                document.getElementById("errorLog").innerText = "ดึงข้อมูลโปรไฟล์ไม่สำเร็จ: " + err.message;
            }
        }

        function fetchUserData(profile) {
            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "registerUser", lineUserId: profile.userId, displayName: profile.displayName })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    document.getElementById("points").innerText = data.points;
                    document.getElementById("level").innerText = data.level;
                    
                    // ระบบดึงข้อมูลวันหมดอายุมาแสดงผล (จัดฟอร์แมตให้เป็น วว/ดด/ปปปป)
                    const warningBox = document.getElementById("expiryWarningBox");
                    if (data.expiringAmount > 0 && data.earliestExpiry) {
                        const expDate = new Date(data.earliestExpiry);
                        const day = String(expDate.getDate()).padStart(2, '0');
                        const month = String(expDate.getMonth() + 1).padStart(2, '0');
                        const year = expDate.getFullYear();
                        
                        document.getElementById("expPoints").innerText = data.expiringAmount;
                        document.getElementById("expDate").innerText = `${day}/${month}/${year}`;
                        warningBox.style.display = "block"; // เปิดให้มองเห็นกล่อง
                    } else {
                        warningBox.style.display = "none"; // ถ้าไม่มีแต้มใกล้หมดอายุ ให้ซ่อนกล่องไว้
                    }
                }
            });
        }

        function fetchOrderHistory(userId) {
            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "getOrderHistory", lineUserId: userId })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    const list = document.getElementById("historyList");
                    list.innerHTML = ""; 
                    if (data.data.length === 0) {
                        list.innerHTML = "<li style='text-align:center;color:gray;font-size:14px;'>ยังไม่มีประวัติค่ะ</li>";
                        return;
                    }
                    data.data.forEach(item => {
                        let statusClass = item.status === "Approved" ? "status-approved" : "status-pending";
                        let statusText = item.status === "Approved" ? "อนุมัติแล้ว" : "รอตรวจสอบ";
                        list.innerHTML += `<li class="history-item"><span>📦 ${item.orderId}</span><span class="${statusClass}">${statusText}</span></li>`;
                    });
                }
            });
        }

        async function submitOrder() {
            const orderInput = document.getElementById("orderId");
            const orderId = orderInput.value.trim().toUpperCase();
            const statusText = document.getElementById("statusMessage");

            if(!orderId) { alert("กรุณาระบุหมายเลขคำสั่งซื้อด้วยค่ะ"); return; }

            statusText.style.color = "orange";
            statusText.innerText = "กำลังส่งข้อมูล...";
            
            try {
                const profile = await liff.getProfile();
                fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "submitOrder", lineUserId: profile.userId, orderId: orderId })
                })
                .then(res => res.json())
                .then(data => {
                    if(data.status === "success") {
                        statusText.style.color = "green";
                        statusText.innerText = "ส่งสำเร็จ! รอตรวจสอบนะคะ";
                        orderInput.value = "";
                        fetchOrderHistory(profile.userId);
                        
                        document.getElementById("historyContent").style.display = "block";
                        document.getElementById("toggleIcon").innerText = "▲";
                    } else {
                        statusText.style.color = "red";
                        statusText.innerText = data.message; 
                    }
                }).catch(() => {
                    statusText.style.color = "red";
                    statusText.innerText = "เกิดข้อผิดพลาด กรุณาลองใหม่";
                });
            } catch (err) { alert("ไม่พบข้อมูลผู้ใช้ กรุณาเข้าสู่ระบบใหม่"); }
        }

        function toggleHistory() {
            const content = document.getElementById("historyContent");
            const icon = document.getElementById("toggleIcon");
            if (content.style.display === "none") {
                content.style.display = "block";
                icon.innerText = "▲";
            } else {
                content.style.display = "none";
                icon.innerText = "▼";
            }
        }

        main();
    </script>
</body>
</html>
